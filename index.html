<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Magic Oracle</title>

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100dvh;
  background: radial-gradient(circle, #222 0%, #050505 80%);
  color: white;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}


.container {
  width: 100%;
  padding: 25px;
}


h1 {
  font-size: clamp(42px, 12vw, 70px);
  margin: 0 0 15px;
}


p {
  font-size: clamp(20px, 5vw, 28px);
  margin-bottom: 35px;
  color: #ddd;
}


/* Magic ball */

.ball {
  width: min(75vw, 320px);
  height: min(75vw, 320px);
  margin: 0 auto 35px;

  background: radial-gradient(circle at 30% 30%, #444, #000);
  border-radius: 50%;

  display: flex;
  justify-content: center;
  align-items: center;

  box-shadow:
    0 0 30px #00ffcc,
    inset 0 0 40px #111;

}


.answer-circle {

  width: 55%;
  height: 55%;

  background: #020202;
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  padding: 15px;

  font-size: clamp(20px, 6vw, 32px);
  color: #00ffcc;

  opacity: 0;

  transition: opacity .4s ease;

}


.answer-circle.show {
  opacity: 1;
}



button {

  border: none;

  background: #00ffcc;
  color: #000;

  padding: 20px 60px;

  border-radius: 50px;

  font-size: clamp(24px, 6vw, 32px);

  font-weight: bold;

  cursor: pointer;

  box-shadow: 0 0 20px #00ffcc;

}


button:active {
  transform: scale(0.95);
}


</style>

</head>


<body>


<div class="container">

<h1>🔮 Magic Oracle</h1>

<p>Tap the ball to reveal your answer</p>


<div class="ball">

<div id="answer" class="answer-circle">
?
</div>

</div>


<button onclick="getAnswer()">ASK</button>


</div>



<script>

const answers = [
"Yes",
"No",
"Maybe",
"Ask again later",
"Definitely",
"Unlikely",
"Signs point to yes",
"The future is unclear"
];


function getAnswer() {

const answerBox = document.getElementById("answer");

answerBox.classList.remove("show");


setTimeout(() => {

const randomIndex = Math.floor(Math.random() * answers.length);

answerBox.innerText = answers[randomIndex];

answerBox.classList.add("show");


}, 300);


}


</script>


</body>
</html>
